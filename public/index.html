<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>キムラディベート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #ff9a3c 0%, #ff5f6d 45%, #ffc371 100%);
      overflow: hidden;
      position: relative;
    }
    body.sukashi-mode {
      background:
        radial-gradient(circle at 50% 18%, rgba(255,237,158,0.2), transparent 30%),
        linear-gradient(180deg, #14060a 0%, #2a080e 48%, #050505 100%);
    }

    /* 背景の装飾サークル */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      top: -180px; right: -120px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      bottom: -100px; left: -80px;
      pointer-events: none;
    }

    .title {
      position: fixed;
      top: 20px;
      left: 0; right: 0;
      text-align: center;
      line-height: 1;
      pointer-events: none;
      z-index: 5;
    }
    .title-kimura {
      display: block;
      font-family: 'Black Han Sans', 'Noto Sans JP', sans-serif;
      font-size: 40px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.14em;
      text-shadow: 0 3px 0 rgba(200,60,20,0.35), 0 6px 20px rgba(0,0,0,0.18);
      -webkit-text-stroke: 1.5px rgba(255,255,255,0.4);
    }
    .title-debate {
      display: block;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.38em;
      color: rgba(255,255,255,0.88);
      margin-top: 4px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }

    .mode-tabs {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
    }
    .mode-tab {
      border: none;
      border-radius: 999px;
      padding: 7px 10px;
      background: transparent;
      color: rgba(255,255,255,0.72);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
    }
    .mode-tab.active {
      background: rgba(255,255,255,0.92);
      color: #5b1600;
    }
    body.sukashi-mode .mode-tab.active { color: #35060a; }

    /* ── 待機 ── */
    .waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }
    .waiting-icon { font-size: 72px; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.15)); }
    .waiting-text {
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      line-height: 1.6;
    }
    .waiting-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #fff;
      animation: blink 1.2s infinite;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── 投票ボタン ── */
    .vote-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      padding: 0 24px;
    }

    .vs-label {
      font-size: 13px;
      font-weight: 900;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2em;
    }

    .btn-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      width: 100%;
    }

    .vote-btn {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.12s;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .vote-btn:active { transform: scale(0.88) !important; }
    .vote-btn:disabled {
      filter: grayscale(0.5) brightness(0.6);
      cursor: not-allowed;
      transform: none !important;
    }

    .vote-btn.kimura {
      background: linear-gradient(145deg, #fff3e0, #ffe0b2, #ffab40);
      box-shadow: 0 10px 40px rgba(255,100,50,0.45), 0 2px 0 rgba(255,255,255,0.6) inset;
    }
    .vote-btn.challenger {
      background: linear-gradient(145deg, #fce4ec, #f8bbd9, #f06292);
      box-shadow: 0 10px 40px rgba(240,98,146,0.45), 0 2px 0 rgba(255,255,255,0.6) inset;
    }

    .btn-emoji { font-size: 38px; line-height: 1; }
    .btn-name {
      font-size: 17px;
      font-weight: 900;
      color: rgba(100,40,0,0.85);
      letter-spacing: 0.04em;
    }
    .vote-btn.challenger .btn-name { color: rgba(100,10,40,0.85); }

    /* リップル */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      transform: scale(0);
      animation: rippleAnim 0.55s ease-out;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* ── 結果 ── */
    .result-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      padding: 0 24px;
    }
    .result-crown { font-size: 64px; }
    .result-label {
      font-size: 15px;
      font-weight: 800;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.12em;
    }
    .result-name {
      font-size: 44px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 24px rgba(0,0,0,0.2);
      line-height: 1.1;
    }
    .result-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }
    .result-counts {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: min(360px, 100%);
      margin-top: 2px;
    }
    .result-count {
      flex: 1;
      min-width: 0;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.16);
    }
    .result-count-name {
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,0.75);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-count-num {
      font-size: 30px;
      font-weight: 900;
      line-height: 1.1;
      margin-top: 2px;
    }

    /* ── スカシコール ── */
    .sukashi-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: 100dvh;
      padding: 116px 22px 28px;
      color: #fff;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .sukashi-stage {
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .sukashi-kicker {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.28em;
      color: rgba(255,231,160,0.82);
    }
    .sukashi-card {
      width: min(260px, 72vw);
      aspect-ratio: 3 / 4;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.94), rgba(255,236,188,0.96) 48%, rgba(211,31,43,0.98) 49%, rgba(119,4,14,0.98));
      box-shadow:
        0 18px 54px rgba(0,0,0,0.42),
        0 0 0 1px rgba(255,236,188,0.32) inset;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      transform: rotate(-1deg);
      transition: transform 0.12s ease, filter 0.12s ease;
      touch-action: manipulation;
    }
    .sukashi-card::before {
      content: '';
      position: absolute;
      inset: 12px;
      border: 2px solid rgba(65,9,10,0.18);
      border-radius: 4px;
    }
    .sukashi-card::after {
      content: '';
      position: absolute;
      left: -28%;
      top: 0;
      width: 34%;
      height: 100%;
      background: rgba(255,255,255,0.22);
      transform: skewX(-18deg);
      transition: left 0.28s ease;
    }
    .sukashi-card:active {
      transform: rotate(0deg) scale(0.94);
      filter: brightness(1.08);
    }
    .sukashi-card:active::after { left: 108%; }
    .sukashi-mark {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #340307;
      text-shadow: 0 2px 0 rgba(255,255,255,0.42);
    }
    .sukashi-main {
      font-size: clamp(46px, 15vw, 74px);
      font-weight: 900;
      letter-spacing: 0.08em;
      writing-mode: vertical-rl;
      line-height: 0.94;
    }
    .sukashi-sub {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.24em;
      color: rgba(52,3,7,0.68);
    }
    .sukashi-count {
      font-size: 13px;
      font-weight: 900;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.08em;
    }
    .sukashi-count strong {
      display: inline-block;
      min-width: 2ch;
      font-size: 30px;
      color: #ffe06e;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
      vertical-align: -0.12em;
    }
    .sukashi-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: rgba(255,236,150,0.5);
      opacity: 0;
      z-index: 10;
    }
    .sukashi-flash.show { animation: sukashiFlash 0.32s ease-out; }
    @keyframes sukashiFlash {
      0% { opacity: 0; }
      22% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── トースト ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      z-index: 99;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="mode-tabs" aria-label="企画切り替え">
  <button class="mode-tab active" id="debateTab" type="button">ディベート</button>
  <button class="mode-tab" id="sukashiTab" type="button">スカシ</button>
</div>

<div class="title">
  <span class="title-kimura" id="mainTitle">キムラ</span>
  <span class="title-debate" id="subTitle">ディベート</span>
</div>

<!-- 待機 -->
<div class="waiting" id="waitingView">
  <div class="waiting-icon">🎙️</div>
  <div class="waiting-text">まもなく開始します</div>
  <div class="waiting-dot"></div>
</div>

<!-- 投票 -->
<div class="vote-wrap" id="voteView">
  <div class="vs-label">どっちが優勢？</div>
  <div class="btn-row">
    <button class="vote-btn kimura" id="kimuraBtn">
      <span class="btn-emoji">🔥</span>
      <span class="btn-name">木村</span>
    </button>
    <button class="vote-btn challenger" id="challengerBtn">
      <span class="btn-emoji">⚡</span>
      <span class="btn-name" id="challengerBtnName">挑戦者</span>
    </button>
  </div>
</div>

<!-- 結果 -->
<div class="result-wrap" id="resultView">
  <div class="result-crown">🏆</div>
  <div class="result-label">WINNER</div>
  <div class="result-name" id="winnerName">-</div>
  <div class="result-counts">
    <div class="result-count">
      <div class="result-count-name">木村</div>
      <div class="result-count-num" id="kimuraFinalCount">0</div>
    </div>
    <div class="result-count">
      <div class="result-count-name" id="challengerFinalName">挑戦者</div>
      <div class="result-count-num" id="challengerFinalCount">0</div>
    </div>
  </div>
  <div class="result-sub">ディベート終了！</div>
</div>

<!-- スカシコール -->
<div class="sukashi-wrap" id="sukashiView">
  <div class="sukashi-stage">
    <div class="sukashi-kicker">SUKASHI CALL</div>
    <button class="sukashi-card" id="sukashiBtn" type="button" aria-label="スカシを鳴らす">
      <span class="sukashi-mark">
        <span class="sukashi-main">スカシ</span>
        <span class="sukashi-sub">CALL</span>
      </span>
    </button>
    <div class="sukashi-count">本日のスカシ <strong id="sukashiCount">0</strong> 回</div>
  </div>
</div>

<div class="sukashi-flash" id="sukashiFlash"></div>
<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let appMode = 'debate';
  let latestState = null;

  function show(id) {
    ['waitingView','voteView','resultView','sukashiView'].forEach(v => {
      const el = document.getElementById(v);
      el.style.display = (v === id) ? (v === 'voteView' ? 'flex' : v === 'resultView' ? 'flex' : 'flex') : 'none';
    });
  }

  function setMode(mode) {
    appMode = mode;
    document.body.classList.toggle('sukashi-mode', mode === 'sukashi');
    document.getElementById('debateTab').classList.toggle('active', mode === 'debate');
    document.getElementById('sukashiTab').classList.toggle('active', mode === 'sukashi');
    document.getElementById('mainTitle').textContent = mode === 'sukashi' ? 'スカシ' : 'キムラ';
    document.getElementById('subTitle').textContent = mode === 'sukashi' ? 'コール' : 'ディベート';
    if (mode === 'sukashi') {
      show('sukashiView');
    } else if (latestState) {
      renderDebateState(latestState);
    } else {
      showWaiting('まもなく開始します');
    }
  }

  function showWaiting(message) {
    document.querySelector('#waitingView .waiting-text').textContent = message;
    show('waitingView');
  }

  function renderDebateState(s) {
    if (s.challengerName) {
      document.getElementById('challengerBtnName').textContent = s.challengerName;
    }
    if (s.debateEnded && s.resultAnnounced) {
      showResult(s.votes, null, s.challengerName);
    } else if (s.debateEnded) {
      showWaiting('結果発表までお待ちください');
    } else if (s.debateActive) {
      show('voteView');
    } else {
      showWaiting('まもなく開始します');
    }
  }

  function applyState(s) {
    latestState = s;
    if (appMode !== 'debate') return;
    renderDebateState(s);
  }

  function showResult(votes, winner, cName) {
    const cn = cName || document.getElementById('challengerBtnName').textContent;
    const w = winner || (
      votes.kimura > votes.challenger ? '木村' :
      votes.challenger > votes.kimura ? cn : '引き分け'
    );
    document.getElementById('winnerName').textContent = w;
    document.getElementById('kimuraFinalCount').textContent = votes.kimura;
    document.getElementById('challengerFinalName').textContent = cn;
    document.getElementById('challengerFinalCount').textContent = votes.challenger;
    show('resultView');
  }

  function vote(candidate, btn, x, y) {
    socket.emit('vote', candidate);
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(btn.offsetWidth, btn.offsetHeight) * 2;
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px`;
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  }

  // AudioContext方式: 連打でも毎回即時再生
  let _actx = null;
  const _bufs = {};

  async function _loadBuf(name, url) {
    const res = await fetch(url);
    const arr = await res.arrayBuffer();
    _bufs[name] = await _actx.decodeAudioData(arr);
  }

  function _initAudio() {
    if (_actx) return;
    _actx = new (window.AudioContext || window.webkitAudioContext)();
    _loadBuf('kimura', '/kimura.mp3?v=2');
    _loadBuf('sukashi', '/sukashi.mp3?v=1');
  }

  function _playBuf(name) {
    if (!_actx || !_bufs[name]) return;
    if (_actx.state === 'suspended') _actx.resume();
    const src = _actx.createBufferSource();
    src.buffer = _bufs[name];
    src.connect(_actx.destination);
    src.start(0);
  }

  function _playFile(url) {
    const audio = new Audio(url);
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }

  function speakKimura() {
    if (_bufs.kimura) _playBuf('kimura');
    else _playFile('/kimura.mp3?v=2');
  }

  function speakSukashi() {
    if (_bufs.sukashi) _playBuf('sukashi');
    else _playFile('/sukashi.mp3?v=1');
  }

  function bindBtn(id, candidate) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (btn.disabled) return;
      _initAudio();
      speakKimura();
      const t = e.touches[0];
      const rect = btn.getBoundingClientRect();
      vote(candidate, btn, t.clientX - rect.left, t.clientY - rect.top);
    }, { passive: false });
    btn.addEventListener('click', (e) => {
      if (btn.disabled) return;
      _initAudio();
      speakKimura();
      const rect = btn.getBoundingClientRect();
      vote(candidate, btn, e.clientX - rect.left, e.clientY - rect.top);
    });
  }

  bindBtn('kimuraBtn', 'kimura');
  bindBtn('challengerBtn', 'challenger');

  let sukashiCount = Number(localStorage.getItem('sukashiCount') || 0);
  document.getElementById('sukashiCount').textContent = sukashiCount;

  function hitSukashi() {
    _initAudio();
    speakSukashi();
    sukashiCount++;
    localStorage.setItem('sukashiCount', String(sukashiCount));
    document.getElementById('sukashiCount').textContent = sukashiCount;
    const flash = document.getElementById('sukashiFlash');
    flash.classList.remove('show');
    void flash.offsetWidth;
    flash.classList.add('show');
    showToast('スカシッ');
  }

  document.getElementById('debateTab').addEventListener('click', () => setMode('debate'));
  document.getElementById('sukashiTab').addEventListener('click', () => setMode('sukashi'));
  document.getElementById('sukashiBtn').addEventListener('click', hitSukashi);

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  socket.on('state_sync', applyState);
  socket.on('vote_update', ({ votes }) => {
    if (latestState) latestState.votes = votes;
  });
  socket.on('debate_started', (s) => {
    applyState(s);
    if (appMode === 'debate') showToast('🎤 ディベート開始！');
  });
  socket.on('debate_ended', ({ votes, challengerName }) => {
    latestState = {
      ...(latestState || {}),
      debateActive: false,
      debateEnded: true,
      resultAnnounced: false,
      votes,
      challengerName
    };
    if (challengerName) {
      document.getElementById('challengerBtnName').textContent = challengerName;
    }
    if (appMode === 'debate') showWaiting('結果発表までお待ちください');
  });
  socket.on('result_announced', ({ votes, winner, challengerName }) => {
    latestState = {
      ...(latestState || {}),
      debateActive: false,
      debateEnded: true,
      resultAnnounced: true,
      votes,
      challengerName
    };
    if (appMode === 'debate') {
      showResult(votes, winner, challengerName);
      showToast(`🏆 ${winner} の勝ち！`);
    }
  });
</script>
</body>
</html>
